<div class="modal" id="reg-modal" role="dialog" aria-modal="true" aria-label="Pick your cohort">
  <div class="modal__card">
    <div class="modal__head">
      <div class="h-26">Pick your <i>cohort.</i></div>
      <button class="modal__x" type="button" data-close-reg aria-label="Close">✕</button>
    </div>
    <div class="modal__intro">Three cohorts are open this month. Registration is handled on Tixtree.</div>
    <div class="cohorts">
      {%- for c in site.data.cohorts -%}
      <a class="modal__row" href="{{ c.link }}" target="_blank" rel="noopener">
        <span class="cal{% if c.dark %} cal--dark{% endif %}">
          <span class="cal__m">{{ c.mon }}</span><span class="cal__d">{{ c.day }}</span>
        </span>
        <span class="cohort__b"><span class="cohort__n">{{ c.name }}</span><span class="cohort__meta">{{ c.meta }}</span></span>
        <span class="modal__tix">Tixtree ↗</span>
      </a>
      {%- endfor -%}
    </div>
    <div class="modal__foot">Running a team? <a href="{{ '/corporate/#sec-inquiry' | relative_url }}">Ask about a private cohort →</a></div>
  </div>
</div>
