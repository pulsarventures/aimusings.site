<!-- Shared contact card for Corporate + Universities (#sec-inquiry). No form. -->
<section id="sec-inquiry" class="section" style="scroll-margin-top:80px">
  <div class="wrap">
    <div class="inquiry">
      <div class="eyebrow">— Let's talk</div>
      <div class="h-30">Tell us about your <i>organization.</i></div>
      <div class="inquiry__d">A 30-minute discovery call is all it takes — we respond with a proposed shape for the program, timeline, and investment.</div>
      <div class="inquiry__btns">
        <a class="btn btn--primary" href="{{ site.v2.cal }}" target="_blank" rel="noopener">Schedule a free call</a>
        <a class="btn btn--ghost" href="mailto:{{ site.v2.email_sree }}">Email us instead</a>
      </div>
      <div class="inquiry__meta"><a href="mailto:{{ site.v2.email_sree }}">{{ site.v2.email_sree }}</a> · <a href="mailto:{{ site.v2.email_swati }}">{{ site.v2.email_swati }}</a> · We respond within one business day.</div>
    </div>
  </div>
</section>
