# Corporate → "AI at work, function by function."
# Each card: 3 use cases + a "Measured by" line. icon = mono lucide svg under /assets/icons/
- name: "Legal"
  icon: "scale.svg"
  cases:
    - "NDA review & redlines against your playbook"
    - "Contract clause extraction & risk flagging"
    - "Intake triage by type, urgency, and owner"
  measured: "review turnaround · matter cycle time"
- name: "Finance"
  icon: "calculator.svg"
  cases:
    - "Variance analysis with root-cause commentary"
    - "Close narrative drafted from actuals vs. budget"
    - "Board pack first drafts from financial data"
  measured: "time from close to narrative"
- name: "Sales"
  icon: "handshake.svg"
  cases:
    - "Pre-call research & brief generation"
    - "Deal folder summaries before QBRs"
    - "Follow-ups drafted from call notes"
  measured: "prep time per call · follow-up speed"
- name: "Product"
  icon: "package.svg"
  cases:
    - "PRD drafts from feedback & analytics"
    - "Feature-request clustering from tickets"
    - "Release notes from commit history"
  measured: "time to first reviewable draft"
- name: "HR"
  icon: "users-round.svg"
  cases:
    - "Review drafts from rubric & manager notes"
    - "Onboarding checklists personalized by role"
    - "Exit-interview synthesis into themes"
  measured: "manager time per review · time-to-hire"
- name: "Marketing"
  icon: "megaphone.svg"
  cases:
    - "Campaign brief to asset draft, on brand"
    - "Competitor messaging analysis"
    - "Event recaps into blog, social & email"
  measured: "concept-to-review time · content velocity"
