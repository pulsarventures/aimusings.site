# Home FAQ accordion. First item is open by default.
- question: "Do I need a technical background?"
  answer: "No. Workshops are built for businesspeople — coaches, consultants, entrepreneurs, operators. We explain the mechanics in plain language, and every build is guided step by step."
- question: "What actually happens in the two sessions?"
  answer: "Session one: AI fundamentals, mechanics, and a deep dive into the tools. Session two: you build — a working prototype and your first AI agent, live, with instructors beside you. You leave with playbooks mapped to your role."
- question: "Is it virtual or in-person?"
  answer: "Public cohorts run live on Zoom. Corporate and university programs can be delivered virtually or on-site at your location."
- question: "How much does it cost?"
  answer: "Public cohort pricing is shown at registration on Tixtree. Corporate and university programs are scoped after a 30-minute discovery call — you get a proposal with timeline, deliverables, and investment."
- question: "How quickly can a corporate program start?"
  answer: "Most engagements begin within 1–2 weeks of the discovery call, depending on your timeline. We respond to all inquiries within one business day."
- question: "Who is this NOT for?"
  answer: "If you want a passive video library, or theory you can watch at 2× speed, we’re not the right fit. Cohorts are live and hands-on — you build in every session, and we expect you to show up."
- question: "Which tools will I work with?"
  answer: "ChatGPT, the Claude family (Claude, Claude Code, Claude Design, Claude CoWork), Gemini, Perplexity, NotebookLM, Gamma, Cursor, Lovable, Codex, MindStudio, and n8n — hands-on, in your own accounts, so everything keeps working after the workshop."
- question: "What happens after the workshop?"
  answer: "You get instant access to the AI Musings community — an alumni group for continued questions, tool updates, and shared learning. The learning doesn’t end when the session does."
- question: "I’m in a job transition. Are there accommodations?"
  answer: "We understand that investing in upskilling during a career shift can be challenging. Reach out to us directly to discuss available accommodations — we review requests individually."
