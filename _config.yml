# ===========================================================================
# AI Musings — site settings (v2)
# ===========================================================================
title: "AI Musings"
description: "Live, hands-on AI fluency workshops for professionals, corporate teams, and universities. Learn the tools, build real things, and apply them Monday morning."
url: "https://aimusings.site"
baseurl: ""
lang: "en"

# --- Shared content the owner maintains -------------------------------------
# Tweakable headline number, shown in the Outcomes stat band.
professionals_trained: "200+"

# Contact + external destinations used across nav, footer, and CTAs.
v2:
  email_sree: "sree@aimusings.site"
  email_swati: "swati@aimusings.site"
  cal: "https://cal.com/sree.pradhip"
  whatsapp: "https://chat.whatsapp.com/GRydfVAJke8AKdnKHFohnS"
  youtube: "https://www.youtube.com/@AIMusingsBuilderCommunitySnS"
  linkedin: "https://www.linkedin.com/company/aimusings/"
  linkedin_swati: "https://www.linkedin.com/in/swatijainatl/"
  linkedin_sree: "https://www.linkedin.com/in/sree-pradhip/"
  academy: "https://academy.aimusings.site"
  testimonials_video: "https://www.youtube.com/embed/pU1DiMgk-ZY"

# --- Build settings ---------------------------------------------------------
markdown: kramdown
highlighter: rouge

# Plugins (all GitHub Pages-supported)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO / social defaults
logo: "/assets/v2/img/logo.png"
social:
  name: "AI Musings"
  links:
    - "https://www.linkedin.com/company/aimusings/"
    - "https://www.youtube.com/@AIMusingsBuilderCommunitySnS"

# Every page gets the branded share card unless it sets its own `image`.
# Note: `author:` is intentionally absent — jekyll-seo-tag would emit the org as a
# schema.org Person. Side effect: seo-tag's WebSite `publisher` node is nameless;
# the real entity data lives in the Organization block from _includes/v2/schema.html.
defaults:
  - scope:
      path: ""
    values:
      image:
        path: "/assets/v2/img/og-card.png"
        width: 1200
        height: 630

# --- Housekeeping -----------------------------------------------------------
timezone: "America/New_York"
encoding: utf-8

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - .git/
  - .github/
  - README.md
  - LICENSE
  - docs/

keep_files:
  - .git
  - .github
  - CNAME
